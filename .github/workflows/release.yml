name: Release

on:
  push:
    branches: [main]
    paths:
      - 'setup.mjs'
      - 'lib/**'
      - 'skills/**'
      - 'backlog-commit-hook.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.releaserc.json'
      - '.github/workflows/release.yml'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
